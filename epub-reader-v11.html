<!DOCTYPE html>
<html lang="bg" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<title>EPUB Reader v11</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
<style>
:root{--bg:#f4f1ea;--sf:#fdfcf8;--sf2:#eae6dc;--bd:#d0cbbe;--tx:#22201a;--txm:#6b6760;--pr:#1a6b70;--prh:#0f4f53;--pk:#fff;--hl:#fff3b0;--tb:52px;--nb:52px;}
[data-theme=dark]{--bg:#1a1815;--sf:#222019;--sf2:#2b2923;--bd:#3a3730;--tx:#e8e1d3;--txm:#a09a8f;--pr:#5aacb3;--prh:#7ec8cf;--pk:#0d2022;--hl:#574a00;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;overflow:hidden;-webkit-tap-highlight-color:transparent;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;color:var(--tx);background:var(--bg);display:flex;flex-direction:column;transition:background .2s,color .2s;}
#topbar{flex-shrink:0;height:var(--tb);display:flex;align-items:center;gap:.3rem;padding:0 .6rem;background:var(--sf);border-bottom:1px solid var(--bd);z-index:30;}
.brand{font-weight:700;font-size:.95rem;margin-right:auto;white-space:nowrap;color:var(--pr);}
.ib{display:inline-flex;align-items:center;justify-content:center;min-height:44px;min-width:44px;padding:0 .5rem;border:1px solid var(--bd);border-radius:8px;background:transparent;color:var(--tx);cursor:pointer;font-size:.88rem;font-family:inherit;transition:background .13s;white-space:nowrap;-webkit-user-select:none;user-select:none;touch-action:manipulation;}
.ib:hover,.ib:active{background:var(--sf2);}
.ibp{background:var(--pr)!important;color:var(--pk)!important;border-color:transparent!important;font-weight:600;}
.ibp:hover,.ibp:active{background:var(--prh)!important;}
#epubFile{display:none;}
#app{flex:1;display:flex;min-height:0;position:relative;}
#sOverlay{display:none;position:absolute;inset:0;background:rgba(0,0,0,.45);z-index:25;}
#sOverlay.show{display:block;}
#sidebar{width:260px;flex-shrink:0;display:flex;flex-direction:column;background:var(--sf);border-right:1px solid var(--bd);transition:transform .25s;z-index:26;}
@media(max-width:700px){#sidebar{position:absolute;top:0;bottom:0;left:0;transform:translateX(-100%);}#sidebar.open{transform:translateX(0);}}
@media(min-width:701px){#sidebar{transform:none!important;}#sidebar.off{width:0;overflow:hidden;border:none;}}
.mb{padding:.7rem .9rem;border-bottom:1px solid var(--bd);font-size:.8rem;color:var(--txm);}
.mb strong{display:block;color:var(--tx);font-size:.88rem;margin-top:.12rem;line-height:1.3;}
#sbox{padding:.5rem .7rem;border-bottom:1px solid var(--bd);display:flex;gap:.3rem;}
#si{flex:1;border:1px solid var(--bd);border-radius:6px;padding:.4rem .65rem;font:inherit;font-size:.84rem;background:var(--bg);color:var(--tx);outline:none;min-height:44px;}
#si:focus{border-color:var(--pr);}
#tocWrap{flex:1;overflow-y:auto;padding:.3rem;-webkit-overflow-scrolling:touch;}
.tb{display:block;width:100%;text-align:left;background:transparent;border:1px solid transparent;border-radius:6px;padding:.55rem .75rem;font:inherit;font-size:.87rem;color:var(--tx);cursor:pointer;min-height:44px;touch-action:manipulation;}
.tb:hover,.tb:active{background:var(--sf2);}
.tb.on{background:var(--sf2);border-color:var(--bd);font-weight:700;color:var(--pr);}
.fp{display:none;position:fixed;right:.75rem;top:calc(var(--tb) + 8px);width:min(310px,calc(100vw - 1.5rem));background:var(--sf);border:1px solid var(--bd);border-radius:12px;box-shadow:0 6px 32px rgba(0,0,0,.2);z-index:50;max-height:65vh;overflow-y:auto;flex-direction:column;}
.fp.open{display:flex!important;flex-direction:column;}
.ph{padding:.65rem .9rem;border-bottom:1px solid var(--bd);font-weight:700;font-size:.9rem;display:flex;justify-content:space-between;align-items:center;flex-shrink:0;}
.bi,.ni{padding:.55rem .9rem;display:flex;justify-content:space-between;align-items:center;gap:.5rem;font-size:.84rem;border-bottom:1px solid var(--bd);}
.bi:hover{background:var(--sf2);}
.bi span{flex:1;cursor:pointer;padding:.3rem 0;}
.bi button,.ni button{background:none;border:none;cursor:pointer;color:var(--txm);font-size:1rem;min-width:36px;min-height:36px;}
.pf2{padding:.55rem .9rem;border-top:1px solid var(--bd);flex-shrink:0;}
#ntA{width:100%;height:90px;border:1px solid var(--bd);border-radius:6px;background:var(--bg);color:var(--tx);font:inherit;font-size:.84rem;padding:.5rem;resize:vertical;outline:none;}
#ntA:focus{border-color:var(--pr);}
#fontPanel .frow{padding:.6rem .9rem;border-bottom:1px solid var(--bd);display:flex;flex-direction:column;gap:.45rem;}
#fontPanel label{font-size:.82rem;color:var(--txm);display:block;}
.fopt{display:flex;gap:.4rem;flex-wrap:wrap;}
.fb{min-height:40px;padding:0 .75rem;border:1px solid var(--bd);border-radius:8px;background:var(--bg);color:var(--tx);cursor:pointer;font-size:.84rem;touch-action:manipulation;}
.fb:hover{background:var(--sf2);}
.fb.on{border-color:var(--pr);background:var(--sf2);color:var(--pr);font-weight:700;}
#lwSlider{width:100%;accent-color:var(--pr);height:6px;cursor:pointer;}
#rw{flex:1;display:flex;flex-direction:column;min-width:0;min-height:0;}
#prog{flex-shrink:0;height:3px;background:var(--sf2);}
#progFill{height:100%;background:var(--pr);width:0;transition:width .25s;}
#reader{flex:1;overflow-y:auto;overflow-x:hidden;padding:2rem clamp(.9rem,4vw,4rem);background:var(--bg);outline:none;-webkit-overflow-scrolling:touch;overscroll-behavior-y:contain;}
#reader::-webkit-scrollbar{width:4px;}
#reader::-webkit-scrollbar-thumb{background:var(--bd);border-radius:999px;}
#chapter{max-width:680px;margin:0 auto;font-family:Georgia,'Times New Roman',serif;font-size:1rem;line-height:1.85;color:var(--tx);}
#chapter h1,#chapter h2,#chapter h3,#chapter h4{line-height:1.3;margin:1.5em 0 .45em;color:var(--tx);}
#chapter h1{font-size:1.55em;}#chapter h2{font-size:1.25em;}#chapter h3{font-size:1.08em;}
#chapter p{margin:.5em 0;}
@media(min-width:500px){#chapter p{text-align:justify;}}
#chapter img,#chapter svg{max-width:100%;height:auto;display:block;margin:1.2em auto;border-radius:4px;}
#chapter a{color:var(--pr);}
#chapter blockquote{border-left:3px solid var(--pr);margin:1em 0;padding:.5em 1em;color:var(--txm);font-style:italic;}
#chapter table{width:100%;border-collapse:collapse;margin:1em 0;}
#chapter td,#chapter th{border:1px solid var(--bd);padding:.4em .55em;font-size:.9em;}
mark.hl{background:var(--hl);border-radius:2px;}
#nb{flex-shrink:0;height:var(--nb);display:flex;align-items:center;justify-content:space-between;padding:0 .75rem;background:var(--sf);border-top:1px solid var(--bd);gap:.4rem;}
.chInfo{font-size:.78rem;color:var(--txm);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;text-align:center;}
#es{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1rem;text-align:center;padding:2rem;background:var(--bg);z-index:10;}
#es h2{font-size:1.2rem;font-family:Georgia,serif;color:var(--tx);}
#es p{color:var(--txm);max-width:320px;line-height:1.6;font-size:.93rem;}
#dz{border:2px dashed var(--bd);border-radius:14px;padding:1.6rem 2.2rem;cursor:pointer;touch-action:manipulation;}
#dz:hover,#dz.drag{border-color:var(--pr);background:var(--sf2);}
#dz svg{width:48px;height:48px;color:var(--pr);margin-bottom:.5rem;}
#toast{position:fixed;bottom:calc(var(--nb) + 12px);left:50%;transform:translateX(-50%);background:var(--tx);color:var(--bg);border-radius:999px;padding:.45rem 1.1rem;font-size:.83rem;opacity:0;transition:opacity .22s;pointer-events:none;z-index:200;white-space:nowrap;max-width:90vw;}
#toast.show{opacity:1;}
#swipeHint{position:fixed;bottom:calc(var(--nb)+16px);left:50%;transform:translateX(-50%);background:rgba(0,0,0,.6);color:#fff;border-radius:999px;padding:.4rem 1rem;font-size:.78rem;opacity:0;transition:opacity .4s;pointer-events:none;z-index:150;}
#swipeHint.show{opacity:1;}
#moreMenu{display:none;position:fixed;right:.6rem;top:calc(var(--tb)+6px);background:var(--sf);border:1px solid var(--bd);border-radius:12px;box-shadow:0 6px 24px rgba(0,0,0,.18);z-index:60;min-width:170px;overflow:hidden;}
@media(max-width:600px){#bBm,#bNotes,#bFont{display:none!important;}#bMore{display:inline-flex!important;}}
</style>
</head>
<body>
<div id="topbar">
  <span class="brand">📖 EPUB</span>
  <label class="ib ibp" for="epubFile">Отвори</label>
  <input type="file" id="epubFile" accept=".epub,application/epub+zip"/>
  <button class="ib" id="bSidebar">☰</button>
  <button class="ib" id="bBm">🔖</button>
  <button class="ib" id="bNotes">📝</button>
  <button class="ib" id="bFont">Аа</button>
  <button class="ib" id="bTheme">🌙</button>
  <button class="ib" id="bMore" style="display:none">⋯</button>
</div>

<div id="moreMenu">
  <button class="ib" id="mBm" style="width:100%;border-radius:0;border:none;border-bottom:1px solid var(--bd);justify-content:flex-start;gap:.5rem;padding:.7rem 1rem;min-height:48px">🔖 Отметки</button>
  <button class="ib" id="mNotes" style="width:100%;border-radius:0;border:none;border-bottom:1px solid var(--bd);justify-content:flex-start;gap:.5rem;padding:.7rem 1rem;min-height:48px">📝 Бележки</button>
  <button class="ib" id="mFont" style="width:100%;border-radius:0;border:none;justify-content:flex-start;gap:.5rem;padding:.7rem 1rem;min-height:48px">Аа Шрифт</button>
</div>

<!-- Bookmarks panel -->
<div id="bmPanel" class="fp">
  <div class="ph">🔖 Отметки <button class="ib" id="bmX" style="height:36px;min-width:36px">✕</button></div>
  <div id="bmList"><div style="padding:.7rem .9rem;font-size:.84rem;color:var(--txm)">Все още няма отметки.</div></div>
  <div class="pf2"><button class="ib ibp" style="width:100%;min-height:44px" id="bmAdd">🔖 Добави на позицията</button></div>
</div>

<!-- Notes panel -->
<div id="ntPanel" class="fp">
  <div class="ph">📝 Бележки <button class="ib" id="ntX" style="height:36px;min-width:36px">✕</button></div>
  <div class="pf2" style="border-top:none;border-bottom:1px solid var(--bd)">
    <textarea id="ntA" placeholder="Бележка за текущата глава..."></textarea>
    <button class="ib ibp" style="width:100%;margin-top:.35rem;min-height:44px" id="ntSave">Запази</button>
  </div>
  <div id="ntList"></div>
</div>

<!-- Font panel -->
<div id="fontPanel" class="fp">
  <div class="ph">Аа Шрифт и изглед <button class="ib" id="fontX" style="height:36px;min-width:36px">✕</button></div>
  <div class="frow">
    <label>Шрифт за четене</label>
    <div class="fopt" id="fontOpts">
      <button class="fb" data-font="Georgia,'Times New Roman',serif" style="font-family:Georgia,serif">Georgia</button>
      <button class="fb" data-font="'Palatino Linotype',Palatino,serif" style="font-family:Palatino,serif">Palatino</button>
      <button class="fb" data-font="'Book Antiqua',Palatino,serif" style="font-family:'Book Antiqua',serif">Book Ant.</button>
      <button class="fb" data-font="-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif">System</button>
      <button class="fb" data-font="Arial,Helvetica,sans-serif" style="font-family:Arial">Arial</button>
      <button class="fb" data-font="Verdana,Geneva,sans-serif" style="font-family:Verdana">Verdana</button>
      <button class="fb" data-font="'Comic Sans MS',cursive" style="letter-spacing:.04em">Dyslexic</button>
    </div>
  </div>
  <div class="frow">
    <label>Размер на текста</label>
    <div style="display:flex;align-items:center;gap:.6rem">
      <button class="ib" id="bSmall" style="min-width:40px;min-height:40px">A−</button>
      <span id="scaleLabel" style="font-size:.83rem;color:var(--txm);min-width:38px;text-align:center">100%</span>
      <button class="ib" id="bLarge" style="min-width:40px;min-height:40px">A+</button>
    </div>
  </div>
  <div class="frow">
    <label>Разредка на редовете</label>
    <input type="range" id="lwSlider" min="1.3" max="2.5" step="0.1" value="1.85"/>
    <span id="lwLabel" style="font-size:.8rem;color:var(--txm);margin-top:.1rem">1.85</span>
  </div>
  <div class="frow">
    <label>Ширина на текста</label>
    <div class="fopt">
      <button class="fb" data-rw="560px">Тясно</button>
      <button class="fb" data-rw="680px">Нормално</button>
      <button class="fb" data-rw="820px">Широко</button>
      <button class="fb" data-rw="100%">Пълно</button>
    </div>
  </div>
</div>

<div id="app">
  <div id="sOverlay"></div>
  <nav id="sidebar">
    <div class="mb">
      <div style="font-size:.74rem">Заглавие</div><strong id="bkTitle">—</strong>
      <div style="font-size:.74rem;margin-top:.35rem">Автор</div><strong id="bkAuthor">—</strong>
    </div>
    <div id="sbox">
      <input id="si" type="search" placeholder="Търси в главата…"/>
      <button class="ib" id="sSrch">🔍</button>
      <button class="ib" id="sClr" style="display:none">✕</button>
    </div>
    <div id="tocWrap"></div>
  </nav>
  <div id="rw">
    <div id="prog"><div id="progFill"></div></div>
    <div id="reader" tabindex="-1">
      <div id="es">
        <div id="dz">
          <svg viewBox="0 0 64 64" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M14 18c0-4.4 3.6-8 8-8h24c2.2 0 4 1.8 4 4v34c0 3.3-2.7 6-6 6H21c-3.9 0-7-3.1-7-7V18z"/>
            <path d="M22 10v36c0 4.4 3.6 8 8 8"/>
            <path d="M29 22h13M29 30h13M29 38h9"/>
          </svg>
          <div style="font-size:.88rem;color:var(--txm);margin-top:.3rem">Провлачи .epub тук или кликни</div>
        </div>
        <h2>Локален EPUB четец</h2>
        <p>Работи изцяло в браузъра — данните ти остават при теб.</p>
        <p style="font-size:.8rem;color:var(--txm)">← → клавиши или swipe за глави</p>
      </div>
      <div id="chapter"></div>
    </div>
    <div id="nb">
      <button class="ib" id="bPrevCh">◀</button>
      <span class="chInfo" id="chInfo">—</span>
      <button class="ib" id="bNextCh">▶</button>
    </div>
  </div>
</div>

<div id="toast"></div>
<div id="swipeHint">← swipe за глави →</div>

<script>
const S={
  zip:null,spine:[],toc:[],manifest:new Map(),
  rootPath:'',opfPath:'',tocPath:'',tocSource:'',tocLoaded:false,
  meta:{title:'—',author:'—'},
  cur:0,scale:1,lineHeight:1.85,
  readFont:"Georgia,'Times New Roman',serif",readWidth:'680px',
  theme:window.matchMedia('(prefers-color-scheme:dark)').matches?'dark':'light',
  cache:new Map(),bm:[],notes:{},swipeHinted:false,bookKey:''
};
const reader=document.getElementById('reader'),chapter=document.getElementById('chapter');
const MOBILE=()=>window.innerWidth<=700;

/* ── localStorage helpers ── */
const LS={
  get(k,fb=null){try{const v=localStorage.getItem(k);return v!==null?JSON.parse(v):fb;}catch{return fb;}},
  set(k,v){try{localStorage.setItem(k,JSON.stringify(v));}catch{}}
};

/* ── persist ── */
function saveGlobal(){
  LS.set('ep11th',S.theme);LS.set('ep11sc',S.scale);LS.set('ep11lh',S.lineHeight);
  LS.set('ep11rf',S.readFont);LS.set('ep11rw',S.readWidth);
  LS.set('ep11sh',S.swipeHinted);LS.set('ep11bm',S.bm);LS.set('ep11nt',S.notes);
}
function savePosition(){
  if(!S.bookKey)return;
  LS.set('ep11pos_'+S.bookKey,{cur:S.cur,st:reader.scrollTop});
}
function loadGlobal(){
  S.theme=LS.get('ep11th',S.theme);
  S.scale=LS.get('ep11sc',1);
  S.lineHeight=LS.get('ep11lh',1.85);
  S.readFont=LS.get('ep11rf',"Georgia,'Times New Roman',serif");
  S.readWidth=LS.get('ep11rw','680px');
  S.swipeHinted=LS.get('ep11sh',false);
  S.bm=LS.get('ep11bm',[]);
  S.notes=LS.get('ep11nt',{});
}
loadGlobal();

/* auto-save position while scrolling */
let _saveTimer=null;
reader.addEventListener('scroll',()=>{
  const max=reader.scrollHeight-reader.clientHeight;
  document.getElementById('progFill').style.width=(max>0?reader.scrollTop/max*100:0)+'%';
  clearTimeout(_saveTimer);_saveTimer=setTimeout(savePosition,800);
},{passive:true});

/* ── theme ── */
applyTheme();
function applyTheme(){document.documentElement.setAttribute('data-theme',S.theme);document.getElementById('bTheme').textContent=S.theme==='dark'?'☀️':'🌙';}
document.getElementById('bTheme').addEventListener('click',()=>{S.theme=S.theme==='dark'?'light':'dark';applyTheme();saveGlobal();});

/* ── typography ── */
applyTypo();
function applyTypo(){
  chapter.style.fontFamily=S.readFont;
  chapter.style.fontSize=S.scale+'rem';
  chapter.style.lineHeight=S.lineHeight;
  chapter.style.maxWidth=S.readWidth;
  document.getElementById('scaleLabel').textContent=Math.round(S.scale*100)+'%';
  document.getElementById('lwSlider').value=S.lineHeight;
  document.getElementById('lwLabel').textContent=S.lineHeight.toFixed(1);
  document.querySelectorAll('.fb[data-font]').forEach(b=>b.classList.toggle('on',b.dataset.font===S.readFont));
  document.querySelectorAll('.fb[data-rw]').forEach(b=>b.classList.toggle('on',b.dataset.rw===S.readWidth));
}
document.getElementById('bSmall').addEventListener('click',()=>{S.scale=Math.max(.75,+(S.scale-.1).toFixed(2));applyTypo();saveGlobal();toast('Текст: '+Math.round(S.scale*100)+'%');});
document.getElementById('bLarge').addEventListener('click',()=>{S.scale=Math.min(2.0,+(S.scale+.1).toFixed(2));applyTypo();saveGlobal();toast('Текст: '+Math.round(S.scale*100)+'%');});
document.getElementById('lwSlider').addEventListener('input',e=>{S.lineHeight=parseFloat(e.target.value);applyTypo();saveGlobal();});
document.getElementById('fontOpts').addEventListener('click',e=>{const b=e.target.closest('.fb[data-font]');if(!b)return;S.readFont=b.dataset.font;applyTypo();saveGlobal();toast('Шрифт: '+b.textContent);});
document.querySelectorAll('.fb[data-rw]').forEach(b=>b.addEventListener('click',()=>{S.readWidth=b.dataset.rw;applyTypo();saveGlobal();toast('Ширина: '+b.textContent);}));

/* ── toast ── */
function toast(m){const e=document.getElementById('toast');e.textContent=m;e.classList.add('show');clearTimeout(e._t);e._t=setTimeout(()=>e.classList.remove('show'),2400);}

/* ── keyboard ── */
window.addEventListener('keydown',e=>{
  if(e.target.matches('input,textarea,select'))return;
  if(e.key==='ArrowDown'){e.preventDefault();if(reader.scrollTop+reader.clientHeight>=reader.scrollHeight-2)gotoChapter(S.cur+1);else reader.scrollBy({top:110,behavior:'smooth'});return;}
  if(e.key==='ArrowUp'){e.preventDefault();if(reader.scrollTop<=2)gotoChapter(S.cur-1);else reader.scrollBy({top:-110,behavior:'smooth'});return;}
  if(e.key==='ArrowRight'){e.preventDefault();gotoChapter(S.cur+1);return;}
  if(e.key==='ArrowLeft'){e.preventDefault();gotoChapter(S.cur-1);return;}
});
reader.addEventListener('click',()=>reader.focus({preventScroll:true}));

/* ── swipe ── */
let _tx=0,_ty=0,_sw=false;
reader.addEventListener('touchstart',e=>{_tx=e.touches[0].clientX;_ty=e.touches[0].clientY;_sw=false;},{passive:true});
reader.addEventListener('touchmove',e=>{const dx=Math.abs(e.touches[0].clientX-_tx),dy=Math.abs(e.touches[0].clientY-_ty);if(dx>18&&dx>dy*1.8)_sw=true;},{passive:true});
reader.addEventListener('touchend',e=>{if(!_sw)return;const dx=e.changedTouches[0].clientX-_tx,dy=Math.abs(e.changedTouches[0].clientY-_ty);if(Math.abs(dx)>60&&Math.abs(dx)>dy*1.5){dx<0?gotoChapter(S.cur+1):gotoChapter(S.cur-1);}_sw=false;},{passive:true});

/* ── sidebar ── */
let sopen=false;
function updateSidebar(){const mob=MOBILE(),sb=document.getElementById('sidebar'),ov=document.getElementById('sOverlay');if(mob){sb.classList.toggle('open',sopen);sb.classList.remove('off');ov.classList.toggle('show',sopen);}else{sb.classList.toggle('off',!sopen);sb.classList.remove('open');ov.classList.remove('show');}}
window.addEventListener('DOMContentLoaded',()=>{sopen=!MOBILE();updateSidebar();applyTypo();});
window.addEventListener('resize',()=>{sopen=!MOBILE();updateSidebar();});
document.getElementById('bSidebar').addEventListener('click',()=>{sopen=!sopen;updateSidebar();});
document.getElementById('sOverlay').addEventListener('click',()=>{sopen=false;updateSidebar();});

/* ── panels ── */
function closePanels(){document.querySelectorAll('.fp').forEach(p=>p.classList.remove('open'));}
['bBm','bmX','bNotes','ntX','bFont','fontX'].forEach(id=>{
  document.getElementById(id).addEventListener('click',()=>{
    if(['bmX','ntX','fontX'].includes(id)){closePanels();return;}
    const map={bBm:'bmPanel',bNotes:'ntPanel',bFont:'fontPanel'};
    const p=document.getElementById(map[id]);
    const w=p.classList.contains('open');closePanels();
    if(!w){if(id==='bBm')renderBm();if(id==='bNotes')renderNt();p.classList.add('open');}
  });
});

/* ── more menu (mobile) ── */
const moreMenu=document.getElementById('moreMenu');
document.getElementById('bMore').addEventListener('click',e=>{e.stopPropagation();moreMenu.style.display=moreMenu.style.display==='none'?'block':'none';});
document.addEventListener('click',e=>{if(!moreMenu.contains(e.target)&&e.target.id!=='bMore')moreMenu.style.display='none';});
['mBm','mNotes','mFont'].forEach(id=>{document.getElementById(id).addEventListener('click',()=>{moreMenu.style.display='none';const map={mBm:'bBm',mNotes:'bNotes',mFont:'bFont'};document.getElementById(map[id]).click();});});

/* ── bookmarks (with text selection) ── */
document.getElementById('bmAdd').addEventListener('click',()=>{
  if(!S.spine.length)return;
  const lbl=S.toc[S.cur]?.label||'Глава '+(S.cur+1);
  const sel=window.getSelection();
  let snippet='',xpath='',selOff=0;
  if(sel&&sel.rangeCount>0&&sel.toString().trim()){
    snippet=sel.toString().trim().slice(0,120);
    const range=sel.getRangeAt(0);selOff=range.startOffset;
    function getXP(node){const parts=[];while(node&&node!==chapter){if(node.nodeType===1){let n=1,s=node;while((s=s.previousElementSibling))n++;parts.unshift(node.tagName.toLowerCase()+'['+n+']');}else if(node.nodeType===3){let n=1,s=node;while((s=s.previousSibling)&&s.nodeType===3)n++;parts.unshift('text()['+n+']');}node=node.parentNode;}return parts.join('/');}
    try{xpath=getXP(range.startContainer);}catch(e){}
  }
  const entry={id:Date.now(),i:S.cur,l:lbl,bk:S.bookKey,snippet,xpath,selOff,st:reader.scrollTop};
  S.bm.push(entry);saveGlobal();renderBm();
  toast(snippet?'Отметка: "'+snippet.slice(0,30)+'…" 🔖':'Отметка на '+lbl+' 🔖');
});

function renderBm(){
  const el=document.getElementById('bmList');
  const filtered=S.bm.filter(b=>!S.bookKey||b.bk===S.bookKey);
  if(!filtered.length){el.innerHTML='<div style="padding:.7rem .9rem;font-size:.84rem;color:var(--txm)">Все още няма отметки.</div>';return;}
  el.innerHTML='';
  filtered.forEach(b=>{
    const gi=S.bm.indexOf(b);
    const d=document.createElement('div');
    d.className='bi';d.style.cssText='flex-direction:column;align-items:flex-start;gap:.1rem';
    const hdr=document.createElement('div');
    hdr.style.cssText='display:flex;justify-content:space-between;width:100%;align-items:center';
    hdr.innerHTML='<strong style="font-size:.84rem;cursor:pointer;flex:1">'+esc(b.l)+'</strong><button data-i="'+gi+'">✕</button>';
    d.appendChild(hdr);
    if(b.snippet){
      const snip=document.createElement('div');
      snip.style.cssText='font-size:.78rem;color:var(--txm);font-style:italic;padding:.1rem 0 .3rem;cursor:pointer;line-height:1.4;width:100%';
      snip.textContent='"'+b.snippet+(b.snippet.length>=120?'…':'')+'"';
      snip.addEventListener('click',()=>jumpToBm(b));
      d.appendChild(snip);
    }
    hdr.querySelector('strong').addEventListener('click',()=>jumpToBm(b));
    hdr.querySelector('button').addEventListener('click',ev=>{S.bm.splice(+ev.target.dataset.i,1);saveGlobal();renderBm();});
    el.appendChild(d);
  });
}

async function jumpToBm(b){
  await gotoChapter(b.i,0);closePanels();
  if(b.xpath){
    try{
      function resolveXP(xp,root){
        const parts=xp.split('/');let node=root;
        for(const p of parts){
          const tm=p.match(/^text\[(\d+)\]$/);
          const em=p.match(/^([a-z0-9]+)\[(\d+)\]$/);
          if(tm){let i=+tm[1],n=node.firstChild;while(n){if(n.nodeType===3){if(--i===0){node=n;break;}}n=n.nextSibling;}}
          else if(em){let i=+em[2],ok=false;for(const c of node.children){if(c.tagName.toLowerCase()===em[1]){if(--i===0){node=c;ok=true;break;}}}if(!ok)return null;}
          else return null;
        }return node;
      }
      const nd=resolveXP(b.xpath,chapter);
      if(nd){
        const rng=document.createRange();
        rng.setStart(nd,Math.min(b.selOff||0,nd.length||0));
        rng.collapse(true);
        const rc=rng.getBoundingClientRect(),rr=reader.getBoundingClientRect();
        reader.scrollTop+=(rc.top-rr.top)-100;
        return;
      }
    }catch(e){}
  }
  if(b.st)reader.scrollTop=b.st;
}

/* ── notes ── */
document.getElementById('ntSave').addEventListener('click',()=>{
  const t=document.getElementById('ntA').value.trim();if(!t)return;
  if(!S.notes[S.cur])S.notes[S.cur]=[];
  const lbl=S.toc[S.cur]?.label||'Глава '+(S.cur+1);
  S.notes[S.cur].push({t,l:lbl,d:new Date().toLocaleDateString('bg')});
  document.getElementById('ntA').value='';saveGlobal();renderNt();toast('Запазена! 📝');
});
function renderNt(){
  const nl=document.getElementById('ntList');
  const all=Object.entries(S.notes).flatMap(([k,a])=>a.map((n,j)=>({...n,k:+k,j})));
  if(!all.length){nl.innerHTML='<div style="padding:.7rem .9rem;font-size:.84rem;color:var(--txm)">Все още няма бележки.</div>';return;}
  nl.innerHTML='';
  [...all].reverse().forEach((n,ri)=>{
    const d=document.createElement('div');d.className='ni';d.style.flexDirection='column';
    d.innerHTML='<div style="display:flex;justify-content:space-between;width:100%"><strong>'+esc(n.l)+'</strong><button data-ri="'+ri+'">✕</button></div><div style="margin:.25rem 0;white-space:pre-wrap">'+esc(n.t)+'</div><small style="color:var(--txm)">'+n.d+'</small>';
    d.querySelector('button').addEventListener('click',ev=>{
      const rev=[...all].reverse();const tg=rev[+ev.target.dataset.ri];
      S.notes[tg.k].splice(tg.j,1);if(!S.notes[tg.k].length)delete S.notes[tg.k];
      saveGlobal();renderNt();
    });
    nl.appendChild(d);
  });
}

/* ── search ── */
document.getElementById('sSrch').addEventListener('click',doSearch);
document.getElementById('si').addEventListener('keydown',e=>{if(e.key==='Enter')doSearch();});
document.getElementById('sClr').addEventListener('click',()=>{document.getElementById('si').value='';document.getElementById('sClr').style.display='none';clearHL();});
function doSearch(){const q=document.getElementById('si').value.trim();document.getElementById('sClr').style.display=q?'':'none';clearHL();if(!q)return;const n=hlText(chapter,q);if(n){const f=chapter.querySelector('mark.hl');if(f)f.scrollIntoView({block:'center',behavior:'smooth'});}toast(n?'Намерени: '+n:'Не е намерено.');}
function clearHL(){chapter.querySelectorAll('mark.hl').forEach(m=>{m.parentNode.replaceChild(document.createTextNode(m.textContent),m);m.parentNode.normalize();});}
function hlText(root,q){let n=0;const w=document.createTreeWalker(root,NodeFilter.SHOW_TEXT);const nodes=[];while(w.nextNode())nodes.push(w.currentNode);const re=new RegExp(q.replace(/[.*+?^${}()|[\]\\]/g,'\\$&'),'gi');nodes.forEach(node=>{const t=node.textContent;if(!re.test(t))return;re.lastIndex=0;const f=document.createDocumentFragment();let l=0,m;while((m=re.exec(t))!==null){f.appendChild(document.createTextNode(t.slice(l,m.index)));const mk=document.createElement('mark');mk.className='hl';mk.textContent=m[0];f.appendChild(mk);l=m.index+m[0].length;n++;}f.appendChild(document.createTextNode(t.slice(l)));node.parentNode.replaceChild(f,node);});return n;}

/* ── nav ── */
document.getElementById('bPrevCh').addEventListener('click',()=>gotoChapter(S.cur-1));
document.getElementById('bNextCh').addEventListener('click',()=>gotoChapter(S.cur+1));

/* ── swipe hint ── */
function showSwipeHint(){if(S.swipeHinted||!MOBILE())return;const h=document.getElementById('swipeHint');h.classList.add('show');setTimeout(()=>{h.classList.remove('show');S.swipeHinted=true;saveGlobal();},2800);}

/* ── drag & drop ── */
reader.addEventListener('dragover',e=>{e.preventDefault();document.getElementById('dz').classList.add('drag');});
reader.addEventListener('dragleave',()=>document.getElementById('dz').classList.remove('drag'));
reader.addEventListener('drop',async e=>{e.preventDefault();document.getElementById('dz').classList.remove('drag');const f=e.dataTransfer.files?.[0];if(f&&f.name.endsWith('.epub'))await openEpub(f);});
document.getElementById('dz').addEventListener('click',()=>document.getElementById('epubFile').click());
document.getElementById('epubFile').addEventListener('change',async e=>{const f=e.target.files?.[0];if(f)await openEpub(f);});

/* ── open epub ── */
async function openEpub(file){
  if(!window.JSZip){toast('JSZip не е заредена.');return;}
  toast('Зареждане…');
  try{
    S.zip=await JSZip.loadAsync(file);S.cache.clear();
    const cont=pxml(await zt('META-INF/container.xml'));
    const rf=cont.querySelector('rootfile');if(!rf)throw new Error('no rootfile');
    S.opfPath=rf.getAttribute('full-path');S.rootPath=dn(S.opfPath);
    const opf=pxml(await zt(S.opfPath));
    parseMeta(opf);parseSpine(opf);prepToc(opf);
    /* stable book key via hash */
    (function(){let h=0,s=S.meta.title+'|'+S.meta.author;for(let i=0;i<s.length;i++){h=(Math.imul(31,h)+s.charCodeAt(i))|0;}S.bookKey='bk'+(h>>>0).toString(36);})();
    document.getElementById('es').style.display='none';
    /* auto-restore position */
    const _pos=LS.get('ep11pos_'+S.bookKey,null);
    if(_pos&&(_pos.cur>0||_pos.st>50)){
      await gotoChapter(_pos.cur,_pos.st);
      toast('📖 '+S.meta.title+' — продължаваш от '+(S.toc[_pos.cur]?.label||'глава '+(_pos.cur+1)));
    }else{
      await gotoChapter(0);
      toast('📖 '+S.meta.title);
    }
    showSwipeHint();
  }catch(err){console.error(err);toast('Грешка: '+err.message);}
}

function parseMeta(opf){const t=[...opf.querySelectorAll('*')].find(e=>e.localName==='title')?.textContent?.trim()||'Без заглавие';const a=[...opf.querySelectorAll('*')].find(e=>e.localName==='creator')?.textContent?.trim()||'—';S.meta={title:t,author:a};document.getElementById('bkTitle').textContent=t;document.getElementById('bkAuthor').textContent=a;}
function parseSpine(opf){S.manifest=new Map();opf.querySelectorAll('manifest > item').forEach(it=>S.manifest.set(it.getAttribute('id'),{href:it.getAttribute('href'),mt:it.getAttribute('media-type'),props:it.getAttribute('properties')||''}));S.spine=[...opf.querySelectorAll('spine > itemref')].map(ir=>{const it=S.manifest.get(ir.getAttribute('idref'));if(!it)return null;return{href:np(jp(S.rootPath,it.href)),mt:it.mt};}).filter(Boolean);}
function prepToc(opf){S.toc=[];S.tocLoaded=false;const nav=[...S.manifest.values()].find(i=>i.props.includes('nav'));const ncxId=opf.querySelector('spine')?.getAttribute('toc');const ncx=ncxId?S.manifest.get(ncxId):null;const c=nav||ncx;if(!c)return;S.tocPath=np(jp(S.rootPath,c.href));S.tocSource=c.mt;}

async function ensureToc(){
  if(S.tocLoaded||!S.tocPath)return;
  const raw=await zt(S.tocPath);
  const isNcx=S.tocSource==='application/x-dtbncx+xml';
  const doc=pxml(raw,isNcx?'application/xml':'application/xhtml+xml');
  if(isNcx){S.toc=[...doc.querySelectorAll('navMap > navPoint')].map((p,i)=>({label:p.querySelector('navLabel > text')?.textContent?.trim()||'Глава '+(i+1),href:np(jp(dn(S.tocPath),(p.querySelector('content')?.getAttribute('src')||'').split('#')[0]))}));}
  else{const nav=doc.querySelector('nav[epub\\:type="toc"],nav[type="toc"],nav');if(nav)S.toc=[...nav.querySelectorAll(':scope > ol > li > a,ol > li > a')].map((a,i)=>({label:a.textContent.trim()||'Глава '+(i+1),href:np(jp(dn(S.tocPath),(a.getAttribute('href')||'').split('#')[0]))})).filter(t=>t.href);}
  const seen=new Set();S.toc=S.toc.filter(t=>{if(seen.has(t.href))return false;seen.add(t.href);return true;});
  S.tocLoaded=true;renderToc();
}

function renderToc(){
  const wrap=document.getElementById('tocWrap');wrap.innerHTML='';
  const items=S.toc.length?S.toc:S.spine.map((_,i)=>({label:'Глава '+(i+1),href:S.spine[i].href}));
  items.forEach((e,i)=>{
    const b=document.createElement('button');b.className='tb';b.textContent=e.label;
    b.addEventListener('click',()=>{const si=S.toc.length?spineIdx(e.href):i;gotoChapter(si>=0?si:i);if(MOBILE()){sopen=false;updateSidebar();}});
    wrap.appendChild(b);
  });hlToc();
}
function hlToc(){
  const items=S.toc.length?S.toc:S.spine.map(s=>({href:s.href}));
  document.querySelectorAll('.tb').forEach((b,i)=>{const on=S.toc.length?spineIdx(items[i]?.href||'')===S.cur:i===S.cur;b.classList.toggle('on',on);if(on)b.scrollIntoView({block:'nearest'});});
}

async function gotoChapter(idx,restoreScrollTop=0){
  if(!S.spine.length)return;
  await ensureToc();
  S.cur=Math.max(0,Math.min(idx,S.spine.length-1));
  const ch=S.spine[S.cur];
  const raw=await zt(ch.href);
  const html=await transformCh(raw,ch.href);
  clearHL();chapter.innerHTML=html;applyTypo();
  reader.scrollTop=restoreScrollTop||0;
  document.getElementById('progFill').style.width='0';
  const lbl=S.toc[S.cur]?.label||'Глава '+(S.cur+1);
  document.getElementById('chInfo').textContent=(S.cur+1)+'/'+S.spine.length+' '+lbl;
  hlToc();reader.focus({preventScroll:true});savePosition();
}

function bindLinks(el,bp){el.querySelectorAll('a[href]').forEach(a=>{const h=a.getAttribute('href');if(!h||/^(https?:|mailto:)/.test(h)){a.target='_blank';a.rel='noopener noreferrer';return;}a.addEventListener('click',async ev=>{ev.preventDefault();const si=spineIdx(np(jp(dn(bp),h.split('#')[0])));if(si>=0)await gotoChapter(si);});});}
async function transformCh(raw,path){const doc=pxml(raw,'application/xhtml+xml');const body=doc.querySelector('body');if(!body)return '<p>Няма съдържание.</p>';for(const el of body.querySelectorAll('[src]')){const s=el.getAttribute('src');if(s&&!/^(https?:|data:)/.test(s))el.setAttribute('src',await r2d(np(jp(dn(path),s))));}body.querySelectorAll('link[rel="stylesheet"],style,script').forEach(e=>e.remove());const tmp=document.createElement('div');tmp.innerHTML=body.innerHTML;bindLinks(tmp,path);return tmp.innerHTML;}
async function r2d(path){if(S.cache.has(path))return S.cache.get(path);const file=S.zip.file(path);if(!file)return '';const blob=await file.async('blob');const url=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(blob);});S.cache.set(path,url);return url;}
async function zt(path){const p=np(path);const f=S.zip.file(p);if(!f)throw new Error('Missing: '+p);return f.async('string');}
function pxml(t,m='application/xml'){return new DOMParser().parseFromString(t,m);}
function np(p){return(p||'').replace(/\\/g,'/').split('/').reduce((a,x)=>{if(!x||x==='.')return a;if(x==='..')a.pop();else a.push(x);return a;},[]).join('/');}
function dn(p){const c=np(p);const i=c.lastIndexOf('/');return i<0?'':c.slice(0,i);}
function jp(base,rel){if(!rel)return np(base);if(rel.startsWith('/'))return np(rel.slice(1));return np((base?base+'/':'')+rel.split('#')[0]);}
function spineIdx(href){const n=np((href||'').split('#')[0]);return S.spine.findIndex(s=>s.href===n);}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}
</script>
